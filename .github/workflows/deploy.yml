name: Deploy VitePress site to Pages

on:
  push:
    branches: [main] # Make sure this matches your branch name (main or master)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Not required but recommended for git metadata

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # This is where VitePress saves the build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
